version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
    environment:
      - DATABASE_URL=sqlite:///./chat_history.db
      - CHROMA_DB_PATH=./chroma_db
      - EXCHANGE_RATE_API_KEY=${EXCHANGE_RATE_API_KEY}
    networks:
      - chatbot_network

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    environment:
      - BACKEND_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    networks:
      - chatbot_network

networks:
  chatbot_network:
    driver: bridge

volumes:
  chroma_data:
